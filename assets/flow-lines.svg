<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="flowing abstract lines">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.45" stop-color="#111827"/>
      <stop offset="1" stop-color="#07111f"/>
    </linearGradient>
    <linearGradient id="lineA" x1="70" y1="260" x2="1140" y2="86" gradientUnits="userSpaceOnUse">
      <stop stop-color="#52f0c8" stop-opacity="0.08"/>
      <stop offset="0.28" stop-color="#52f0c8" stop-opacity="0.82"/>
      <stop offset="0.61" stop-color="#9ab7ff" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#ff8fb7" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="lineB" x1="20" y1="112" x2="1160" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffcf66" stop-opacity="0.1"/>
      <stop offset="0.36" stop-color="#ffcf66" stop-opacity="0.64"/>
      <stop offset="0.7" stop-color="#52f0c8" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#9ab7ff" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="softGlow" x="-80" y="-80" width="1360" height="520" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.32 0 0 0 0 0.94 0 0 0 0 0.82 0 0 0 0.45 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <style>
      .thread {
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 16 34 90 42;
        animation: drift 12s ease-in-out infinite alternate;
      }
      .thread.fast {
        animation-duration: 8s;
        stroke-dasharray: 10 24 70 30;
      }
      .thread.slow {
        animation-duration: 17s;
        stroke-dasharray: 22 46 120 58;
      }
      .grain {
        opacity: 0.2;
      }
      @keyframes drift {
        from {
          stroke-dashoffset: 0;
          transform: translate3d(-8px, 2px, 0);
        }
        to {
          stroke-dashoffset: -220;
          transform: translate3d(12px, -5px, 0);
        }
      }
    </style>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>

  <g opacity="0.36">
    <path d="M52 286C157 214 214 258 326 199C448 135 476 89 604 123C739 160 777 240 895 188C1008 139 1057 65 1151 101" stroke="#23304f" stroke-width="1.2"/>
    <path d="M39 103C155 132 203 81 307 92C430 105 482 210 594 203C696 197 725 104 848 113C958 121 1031 199 1164 151" stroke="#23304f" stroke-width="1"/>
    <path d="M82 322C180 295 271 319 352 278C433 237 470 166 560 164C671 162 727 270 842 265C962 260 1019 179 1132 204" stroke="#18243e" stroke-width="1"/>
  </g>

  <g filter="url(#softGlow)">
    <path class="thread slow" d="M49 248C137 223 182 166 285 182C408 201 423 295 548 263C659 235 700 93 820 88C934 83 991 190 1148 131" stroke="url(#lineA)" stroke-width="2.4"/>
    <path class="thread" d="M37 158C121 118 178 127 247 155C334 191 374 250 467 230C594 202 606 67 735 81C849 94 895 224 1012 217C1084 213 1121 169 1168 149" stroke="url(#lineB)" stroke-width="2"/>
    <path class="thread fast" d="M81 286C173 245 236 270 314 229C390 188 398 105 497 103C621 100 650 245 772 244C894 243 918 102 1044 93C1091 90 1128 104 1172 129" stroke="#9ab7ff" stroke-opacity="0.42" stroke-width="1.55"/>
    <path class="thread slow" d="M29 209C94 242 166 239 224 205C311 154 321 75 428 78C531 81 558 174 655 175C767 176 789 70 901 73C1007 75 1056 159 1169 171" stroke="#52f0c8" stroke-opacity="0.36" stroke-width="1.4"/>
    <path class="thread" d="M65 96C167 64 222 98 305 130C424 176 498 159 565 111C648 52 720 41 791 92C883 158 929 250 1034 252C1094 253 1137 232 1173 207" stroke="#ff8fb7" stroke-opacity="0.34" stroke-width="1.25"/>
  </g>

  <g class="grain">
    <circle cx="154" cy="102" r="1.2" fill="#d7fff4"/>
    <circle cx="298" cy="244" r="0.9" fill="#9ab7ff"/>
    <circle cx="421" cy="83" r="1.1" fill="#ffcf66"/>
    <circle cx="614" cy="270" r="0.8" fill="#d7fff4"/>
    <circle cx="793" cy="116" r="1" fill="#ff8fb7"/>
